# 文件类型注册表
# 格式：<后缀>:<执行格式>:<优先级>

# Windows可执行
.exe:PE:10|0x4D5A:20  # PE格式魔数(MZ头)
.dll:PE:20
.bat:Script:30
.cmd:Script:30


# macOS可执行
.app:Mach-O:10
.dmg:Mach-O:20
.pkg:Mach-O:30

# Linux可执行
.sh:Script:50
.so:ELF:20
.deb:ELF:30
.bin:ELF:0x7F454C46:40  # ELF魔数(7F 45 4C 46)


# 通用格式
.apk:ELF:40
.apkx:Mach-O:0xCAFEBABE:50
.appimage:ELF:50
.msi:PE:60
.ipa:Mach-O:0xFEEDFACE:45


# 脚本类型
.com:COM:100
.scr:PE:70